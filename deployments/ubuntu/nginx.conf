# =============================================================================
# Nginx configuration — InspectorRAGet (IP-only, self-signed TLS)
#
# Prerequisites:
#   - Self-signed cert generated by setup.sh at:
#       /etc/ssl/certs/inspectorraget-selfsigned.crt
#       /etc/ssl/private/inspectorraget-selfsigned.key
#   - Next.js running on 127.0.0.1:3000 via PM2
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/inspectorraget
#   sudo ln -s /etc/nginx/sites-available/inspectorraget /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones (defined at http context — included via nginx.conf)
# ---------------------------------------------------------------------------
# 10 req/s per IP; burst of 20 handles momentary spikes (page navigations,
# asset loads).
limit_req_zone $binary_remote_addr zone=inspectorraget_limit:10m rate=10r/s;

# ---------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    # Redirect every HTTP request to HTTPS
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS — main server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    # ------------------------------------------------------------------
    # TLS — self-signed certificate
    # ------------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/inspectorraget-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/inspectorraget-selfsigned.key;

    # Modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # Proxy to Next.js (PM2)
    # ------------------------------------------------------------------
    location / {
        # Rate limiting — nodelay rejects over-burst immediately
        limit_req zone=inspectorraget_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / future use)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ------------------------------------------------------------------
    # Static assets — cache aggressively, no rate limiting needed
    # ------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ------------------------------------------------------------------
    # Deny access to dot-files
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
    }
}
